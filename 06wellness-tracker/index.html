<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/small.css">
    <link rel="stylesheet" href="css/medium.css">
    <link rel="stylesheet" href="css/large.css">

</head>
<body>
    <header>Wellness Tracker</header>
    <div id="newProfile">
        <p>Please complete your emotional profile.</p>
        <form>
            <label>First: <input type="text" name="first" required></label>
            <label>Last: <input type="text" name="last" required></label>
            <label>Emotional State: <select id="physical">
                <option value="https://openmoji.org/data/color/svg/263A.svg">Happy</option>
                <option value="https://openmoji.org/data/color/svg/1F625.svg">Sad</option>
                <option value="https://openmoji.org/data/color/svg/1F620.svg">Angry</option>
                <option value="https://openmoji.org/data/color/svg/1F634.svg">Bored</option>
                <option value="https://openmoji.org/data/color/svg/1F912.svg">Sick</option>
            </select></label>
            <input type="submit" value="Save Profile" id="saveProfile">
        </form>
    </div>
<!-- two dif pages -->
    <div id="myProfile">
        <section>
            <img src="" id="emoji">
            <p><span id="first"></span> <span id="last"></span> is currently feeling <span id="emotion"></span>.</p>
        </section>
        <button id="delProfile"> Delete Profile</button>
    </div>


    <script src="js/scripts.js"></script>
</body>
</html>
